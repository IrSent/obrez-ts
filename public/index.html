<!DOCTYPE html>
<html lang="en" translate="no">
	<head>
		<meta charset="UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Obrez</title>
		<script type="module" src="../src/base.ts"></script>
		<script type="module" src="../src/media-player.ts"></script>
		<link rel="stylesheet" href="../src/base.css">
		<link rel="icon" href="../assets/obrez-icon.svg">
	</head>

	<body class="bg-zinc-900 text-zinc-200 p-10">
		<div class="flex gap-8 w-full">
			<div class="w-1/4 flex flex-col items-end gap-6">
				<img src="../assets/obrez-logo.png" class="size-32">
				<h1 class="text-3xl font-bold text-purple-500">obrez</h1>

				<div class="flex flex-col gap-2 w-full items-end">
					<button id="select-file" class="w-48 text-right bg-zinc-800 p-2 rounded">Select file</button>
					<button id="load-url" class="w-48 text-right bg-zinc-800 p-2 rounded">Load URL</button>
				</div>

				<div class="w-full">
					<table class="w-full text-sm border border-zinc-700">
						<tbody id="dict-table-body">
						</tbody>
					</table>
					<div class="flex gap-2 mt-2 justify-end">
						<input id="new-slug" type="text" class="w-24 bg-zinc-800 p-1 rounded text-sm" placeholder="Slug">
						<button id="add-dict-btn" class="bg-purple-600 px-2 py-1 rounded text-sm">Add</button>
					</div>
				</div>
			</div>

			<div class="w-3/4 flex flex-col gap-1">
				<p class="text-xs opacity-60 mt-0" id="file-name"></p>
				<hr class="w-full max-w-96 my-1 border-zinc-700" style="display: none;">
				<p id="error-element" class="text-red-500"></p>
				<p id="warning-element" class="text-amber-500 mb-1"></p>
				<p id="loading-element" class="text-sm animate-pulse text-zinc-500" style="display: none;">Loading...</p>

				<div id="player" class="relative group w-full aspect-video overflow-hidden rounded-xl bg-black shadow-2xl" style="display: none;">
					<canvas class="w-full h-full object-contain" width="1280" height="720"></canvas>

					<div id="controls" class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/90 via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300" >
						<div class="flex items-center gap-4 w-full">
							<button class="shrink-0 invert" id="play-button">
								<div class="flex-grow">
									<img src="../assets/play-icon.svg" class="size-full" id="play-icon">
									<img src="../assets/pause-icon.svg" class="size-full" id="pause-icon" style="display: none;">
								</div>
							</button>

							<div class="hidden sm:flex items-center">
								<button class="p-2 mr-1 group" id="volume-button">
									<div class="size-6 invert group-hover:scale-110" id="volume-icon-wrapper">
										<img src="../assets/volume-off-icon.svg" class="size-full">
										<img src="../assets/volume-x-icon.svg" class="size-full">
										<img src="../assets/volume-0-icon.svg" class="size-full">
										<img src="../assets/volume-1-icon.svg" class="size-full">
										<img src="../assets/volume-2-icon.svg" class="size-full">
									</div>
								</button>

								<div class="w-16 relative rounded-full bg-zinc-800/75 h-1.5 group touch-none" id="volume-bar-container">
									<div class="absolute h-full top-0 left-0 rounded-full bg-zinc-200 group-hover:bg-white" id="volume-bar">
										<div class="size-3 rounded-full bg-zinc-200 absolute top-1/2 right-0 -translate-y-1/2 translate-x-1/2 group-hover:scale-110 group-hover:bg-white group-hover:shadow"></div>
									</div>
								</div>
							</div>

							<p id="current-time" class="text-sm tabular-nums w-20 text-right"></p>

							<div class="flex-1 relative rounded-full bg-zinc-800/75 h-2 mx-4 group touch-none" id="progress-bar-container">
								<div class="absolute h-full top-0 left-0 rounded-full bg-zinc-200 group-hover:bg-white" id="progress-bar">
									<div class="size-4 rounded-full bg-zinc-200 absolute top-1/2 right-0 -translate-y-1/2 translate-x-1/2 group-hover:scale-110 group-hover:bg-white group-hover:shadow"></div>
								</div>
							</div>

							<p id="duration" class="text-sm tabular-nums w-20 text-right"></p>

							<button class="shrink-0" id="fullscreen-button">
								<div class="size-6 invert group-hover:scale-110">
									<img src="../assets/fullscreen-icon.svg" class="size-full">
								</div>
							</button>
						</div>
					</div>
				</div>

				<div class="flex gap-2 mt-4">
					<button id="transcribe" class="rounded-lg bg-purple-600 text-white hover:bg-purple-700 px-5 py-2" style="display: none;">
					</button>
				</div>

				<div class="flex gap-2 mt-4">
					<button id="focus-closest" class="mb-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700" style="display: none;">
  						Scroll to current
					</button>
				</div>

				<div id="results-container" class="w-full" style="scroll-behavior: smooth; display: none; max-height: 600px; overflow-y: auto; border: 1px solid #3f3f46;">
					<h3 class="text-lg font-semibold text-purple-500">Transcription Results</h3>
					<div class="overflow-hidden rounded-lg border border-zinc-200 dark:border-zinc-700">
						<table class="min-w-full">
							<thead class="sticky top-0 bg-zinc-900">
								<tr>
									<th class="px-5 py-2 text-left text-xs font-medium uppercase">Start</th>
									<th class="px-5 py-2 text-left text-xs font-medium uppercase">End</th>
									<th class="px-5 py-2 text-left text-xs font-medium uppercase">Word</th>
									<th class="px-5 py-2 text-left text-xs font-medium uppercase">Triggered</th>
									<th class="px-5 py-2 text-left text-xs font-medium uppercase">Actions</th>
								</tr>
							</thead>
							<tbody id="results-body" class="divide-y divide-zinc-200 dark:divide-zinc-700 bg-white dark:bg-zinc-900">
								</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
