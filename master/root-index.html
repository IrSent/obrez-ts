<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obrez</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }

    /* ── iframe ── */
    #app-frame {
      width: 100%; height: 100%;
      border: none;
      position: absolute;
      top: 0; left: 0;
    }

    /* ── шестерня ── */
    #gear {
      position: fixed;
      top: -36px; right: -36px;
      width: 72px; height: 72px;
      z-index: 9999;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(.4,0,.2,1), filter 0.35s ease;
      filter: drop-shadow(0 0 0px transparent);
      opacity: 0.25;
    }
    #gear:hover {
      transform: translate(-20px, 20px);
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.35));
      opacity: 1;
    }
    #gear svg {
      width: 100%; height: 100%;
      animation: spin 12s linear infinite;
      transform-origin: center;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── модалка ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #1f1f23;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px 32px;
      min-width: 320px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    #modal h2 {
      color: #eee;
      font-size: 18px;
      margin-bottom: 16px;
    }
    #modal .version-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #modal .version-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ccc;
      font-size: 14px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    #modal .version-item:hover { background: #2a2a30; }
    #modal .version-item.active { background: #2a2a30; color: #fff; }
    #modal .version-item input { display: none; }
    #modal .version-item .radio {
      width: 16px; height: 16px;
      border: 2px solid #555;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s;
    }
    #modal .version-item.active .radio {
      border-color: #6c8cff;
    }
    #modal .version-item.active .radio::after {
      content: '';
      width: 8px; height: 8px;
      background: #6c8cff;
      border-radius: 50%;
    }
    #modal .close-btn {
      margin-top: 16px;
      width: 100%;
      padding: 8px;
      background: #333;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }
    #modal .close-btn:hover { background: #444; }
    #modal .version-label { font-weight: 600; }
  </style>
</head>
<body>
  <iframe id="app-frame" title="Obrez"></iframe>

  <!-- шестерня -->
  <div id="gear" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
    </svg>
  </div>

  <!-- модалка -->
  <div id="modal-overlay">
    <div id="modal">
      <h2>⚙ Настройки</h2>
      <div class="version-list" id="version-list"></div>
      <button class="close-btn" id="close-modal">Закрыть</button>
    </div>
  </div>

  <script>
    const frame = document.getElementById('app-frame');
    const gear = document.getElementById('gear');
    const overlay = document.getElementById('modal-overlay');
    const versionList = document.getElementById('version-list');
    const closeBtn = document.getElementById('close-modal');

    let versions = { default: 'master', versions: ['master'] };
    let currentVersion = localStorage.getItem('obrez-version') || null;

    // Загрузка списка версий
    fetch('/stable-versions.json')
      .then(r => r.json())
      .then(data => { versions = data; })
      .catch(() => {})
      .finally(() => {
        // Если сохранённая версия есть в списке, используем её, иначе дефолт
        if (currentVersion && !versions.versions.includes(currentVersion)) {
          currentVersion = null;
        }
        currentVersion = currentVersion || versions.default;
        frame.src = `/${currentVersion}/`;
        renderList();
      });

    function renderList() {
      versionList.innerHTML = '';
      versions.versions.forEach(v => {
        const item = document.createElement('div');
        item.className = 'version-item' + (v === currentVersion ? ' active' : '');
        item.innerHTML = `<span class="radio"></span><span class="version-label">${v}</span>`;
        item.addEventListener('click', () => {
          currentVersion = v;
          frame.src = `/${v}/`;
          localStorage.setItem('obrez-version', v);
          renderList();
        });
        versionList.appendChild(item);
      });
    }

    gear.addEventListener('click', () => overlay.classList.add('open'));
    closeBtn.addEventListener('click', () => overlay.classList.remove('open'));
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
  </script>
</body>
</html>
